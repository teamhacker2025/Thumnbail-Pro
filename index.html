<script>
/* ================= ADMIN CONFIG ================= */
const ADMIN_ID = "Ashish@2007";
const ADMIN_PASS = "Ashish@2025";

/* Load saved ads */
let ads = JSON.parse(localStorage.getItem("adsConfig")) || {
    top: "",
    bottom: "",
    left: "",
    right: "",
    image: ""
};

/* Detect admin route */
if (window.location.hash === "#admin") {
    showLogin();
}

/* ============ LOGIN UI ============ */
function showLogin(){
    document.body.innerHTML += `
    <div id="adminLogin" style="
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,0.9);display:flex;
        align-items:center;justify-content:center;z-index:9999;">
        
        <div style="background:#111;padding:20px;border-radius:12px;width:300px;">
            <h3 style="color:#fff;margin-bottom:10px;">Admin Login</h3>
            <input id="aid" placeholder="Admin ID" style="width:100%;padding:10px;margin-bottom:10px;">
            <input id="apass" type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;">
            <button onclick="loginAdmin()" style="width:100%;padding:10px;background:#e91e63;color:#fff;border:none;">Login</button>
        </div>
    </div>`;
}

function loginAdmin(){
    const id = document.getElementById("aid").value;
    const pass = document.getElementById("apass").value;

    if(id === ADMIN_ID && pass === ADMIN_PASS){
        openAdminPanel();
    } else {
        alert("Wrong Credentials");
    }
}

/* ============ ADMIN PANEL ============ */
function openAdminPanel(){
    document.body.innerHTML = `
    <div style="padding:20px;background:#000;color:#fff;min-height:100vh;">
        <h2>Admin Panel</h2>

        <h3>Top Ad Script</h3>
        <textarea id="topAd" style="width:100%;height:80px;">${ads.top}</textarea>

        <h3>Bottom Ad Script</h3>
        <textarea id="bottomAd" style="width:100%;height:80px;">${ads.bottom}</textarea>

        <h3>Left Ad Script</h3>
        <textarea id="leftAd" style="width:100%;height:80px;">${ads.left}</textarea>

        <h3>Right Ad Script</h3>
        <textarea id="rightAd" style="width:100%;height:80px;">${ads.right}</textarea>

        <h3>Image Below Ad</h3>
        <textarea id="imgAd" style="width:100%;height:80px;">${ads.image}</textarea>

        <br><br>

        <button onclick="saveAds()" style="padding:10px;background:green;color:#fff;border:none;">Save Ads</button>
        <button onclick="deleteAds()" style="padding:10px;background:red;color:#fff;border:none;">Delete Ads</button>
    </div>`;
}

function saveAds(){
    ads = {
        top: document.getElementById("topAd").value,
        bottom: document.getElementById("bottomAd").value,
        left: document.getElementById("leftAd").value,
        right: document.getElementById("rightAd").value,
        image: document.getElementById("imgAd").value
    };

    localStorage.setItem("adsConfig", JSON.stringify(ads));
    alert("Ads Saved Permanently!");
    location.reload();
}

function deleteAds(){
    localStorage.removeItem("adsConfig");
    alert("Ads Deleted!");
    location.reload();
}

/* ============ RENDER ADS ============ */
function injectAd(position, code){
    if(!code) return;
    const div = document.createElement("div");
    div.innerHTML = code;
    document.body.appendChild(div);
}

window.addEventListener("load", () => {
    injectAd("top", ads.top);
    injectAd("bottom", ads.bottom);
    injectAd("left", ads.left);
    injectAd("right", ads.right);
});
</script>
