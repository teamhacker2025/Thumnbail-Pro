<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Pro</title>

<style>
body{
    margin:0;
    background:#050505;
    color:#fff;
    font-family:sans-serif;
    text-align:center;
}

/* MAIN */
.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
}

#resultArea{display:none}

/* ADS */
#adTop{
    width:100%;
    text-align:center;
    margin-bottom:10px;
}

#adBottom{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#000;
    text-align:center;
    z-index:999;
}

#adLeft{
    position:fixed;
    left:0;
    top:40%;
    z-index:999;
}

#adRight{
    position:fixed;
    right:0;
    top:40%;
    z-index:999;
}

#adImage{
    margin-top:10px;
}
</style>
</head>

<body>

<!-- TOP AD -->
<div id="adTop"></div>

<div class="container">

<h2>Thumbnail Downloader</h2>

<input type="text" id="videoUrl" placeholder="Paste YouTube URL">
<button onclick="generateThumbnail()">Get Thumbnail</button>

<div id="resultArea">
    <img id="thumbImg" width="100%">
    
    <!-- IMAGE AD -->
    <div id="adImage"></div>

    <button onclick="downloadThumb()">Download</button>
</div>

</div>

<!-- SIDE ADS -->
<div id="adLeft"></div>
<div id="adRight"></div>

<!-- BOTTOM AD -->
<div id="adBottom"></div>

<script>
window.addEventListener("DOMContentLoaded", () => {

const ADMIN_ID = "Ashish@2007";
const ADMIN_PASS = "Ashish@2025";

/* LOAD ADS */
let ads = JSON.parse(localStorage.getItem("adsConfig")) || {
    top:"",bottom:"",left:"",right:"",image:""
};

/* APPLY ADS */
function loadAds(){
    document.getElementById("adTop").innerHTML = ads.top;
    document.getElementById("adBottom").innerHTML = ads.bottom;
    document.getElementById("adLeft").innerHTML = ads.left;
    document.getElementById("adRight").innerHTML = ads.right;
    document.getElementById("adImage").innerHTML = ads.image;
}
loadAds();

/* ADMIN ROUTE */
if(window.location.hash === "#admin"){ showLogin(); }

/* LOGIN */
function showLogin(){
    const d=document.createElement("div");
    d.style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999";
    d.innerHTML=`
    <div style="background:#111;padding:20px">
    <input id="aid" placeholder="ID"><br><br>
    <input id="apass" type="password" placeholder="PASS"><br><br>
    <button onclick="loginAdmin()">Login</button>
    </div>`;
    document.body.appendChild(d);
}

/* LOGIN CHECK */
window.loginAdmin=function(){
    const id=document.getElementById("aid").value;
    const pass=document.getElementById("apass").value;
    if(id===ADMIN_ID && pass===ADMIN_PASS){
        document.body.innerHTML += "";
        openPanel();
    } else alert("Wrong");
}

/* PANEL */
function openPanel(){
    const p=document.createElement("div");
    p.style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;color:#fff;z-index:9999;overflow:auto;padding:20px";
    p.innerHTML=`
    <h2>Admin Panel</h2>

    Top:<textarea id="top">${ads.top}</textarea>
    Bottom:<textarea id="bottom">${ads.bottom}</textarea>
    Left:<textarea id="left">${ads.left}</textarea>
    Right:<textarea id="right">${ads.right}</textarea>
    Image:<textarea id="image">${ads.image}</textarea>

    <br><br>
    <button onclick="saveAds()">Save</button>
    <button onclick="deleteAds()">Delete</button>
    <button onclick="location.reload()">Close</button>
    `;
    document.body.appendChild(p);
}

/* SAVE */
window.saveAds=function(){
    ads={
        top:top.value,
        bottom:bottom.value,
        left:left.value,
        right:right.value,
        image:image.value
    };
    localStorage.setItem("adsConfig",JSON.stringify(ads));
    alert("Saved");
    location.reload();
}

/* DELETE */
window.deleteAds=function(){
    localStorage.removeItem("adsConfig");
    alert("Deleted");
    location.reload();
}

/* THUMBNAIL */
window.generateThumbnail=function(){
    let url=document.getElementById("videoUrl").value;
    let id=url.split("v=")[1];
    if(!id) return alert("Invalid URL");

    document.getElementById("resultArea").style.display="block";
    document.getElementById("thumbImg").src=`https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
}

/* DOWNLOAD */
window.downloadThumb=function(){
    window.open(document.getElementById("thumbImg").src);
}

});
</script>

</body>
</html>
