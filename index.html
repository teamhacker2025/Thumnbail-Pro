<script>
    const ADMIN_ID = "Ashish@2007";
const ADMIN_PASS = "Ashish@2025";

/* Load saved ads */
let ads = JSON.parse(localStorage.getItem("adsConfig")) || {
    top: "",
    bottom: "",
    left: "",
    right: "",
    image: ""
};

/* Detect admin route */
if (window.location.hash === "#admin") {
    showLogin();
}

/* ================= LOGIN ================= */
function showLogin() {
    const login = document.createElement("div");

    login.style = `
        position:fixed;
        top:0;left:0;
        width:100%;height:100%;
        background:rgba(0,0,0,0.9);
        display:flex;
        align-items:center;
        justify-content:center;
        z-index:99999;
    `;

    login.innerHTML = `
        <div style="background:#111;padding:20px;border-radius:12px;width:300px;">
            <h3 style="color:#fff;">Admin Login</h3>

            <input id="aid" placeholder="Admin ID"
                style="width:100%;padding:10px;margin:10px 0;">

            <input id="apass" type="password" placeholder="Password"
                style="width:100%;padding:10px;margin-bottom:10px;">

            <button onclick="loginAdmin()"
                style="width:100%;padding:10px;background:#e91e63;color:#fff;border:none;">
                Login
            </button>
        </div>
    `;

    document.body.appendChild(login);
}

/* ================= LOGIN CHECK ================= */
function loginAdmin() {
    const id = document.getElementById("aid").value;
    const pass = document.getElementById("apass").value;

    if (id === ADMIN_ID && pass === ADMIN_PASS) {
        document.getElementById("aid").parentElement.parentElement.remove();
        openAdminPanel();
    } else {
        alert("Wrong Credentials!");
    }
}

/* ================= ADMIN PANEL (NO WHITE SCREEN FIX) ================= */
function openAdminPanel() {
    const panel = document.createElement("div");

    panel.id = "adminPanel";

    panel.style = `
        position:fixed;
        top:0;left:0;
        width:100%;height:100%;
        background:#000;
        color:#fff;
        z-index:99998;
        overflow:auto;
        padding:20px;
    `;

    panel.innerHTML = `
        <h2>Admin Panel</h2>

        <h3>Top Ad Script</h3>
        <textarea id="topAd" style="width:100%;height:80px;">${ads.top}</textarea>

        <h3>Bottom Ad Script</h3>
        <textarea id="bottomAd" style="width:100%;height:80px;">${ads.bottom}</textarea>

        <h3>Left Ad Script</h3>
        <textarea id="leftAd" style="width:100%;height:80px;">${ads.left}</textarea>

        <h3>Right Ad Script</h3>
        <textarea id="rightAd" style="width:100%;height:80px;">${ads.right}</textarea>

        <h3>Image Below Ad</h3>
        <textarea id="imgAd" style="width:100%;height:80px;">${ads.image}</textarea>

        <br><br>

        <button onclick="saveAds()" style="padding:10px;background:green;color:#fff;border:none;">
            Save Ads
        </button>

        <button onclick="deleteAds()" style="padding:10px;background:red;color:#fff;border:none;">
            Delete Ads
        </button>

        <button onclick="closeAdmin()" style="padding:10px;background:gray;color:#fff;border:none;">
            Close
        </button>
    `;

    document.body.appendChild(panel);
}

/* ================= CLOSE ADMIN ================= */
function closeAdmin() {
    document.getElementById("adminPanel").remove();
}

/* ================= SAVE ADS ================= */
function saveAds() {
    ads = {
        top: document.getElementById("topAd").value,
        bottom: document.getElementById("bottomAd").value,
        left: document.getElementById("leftAd").value,
        right: document.getElementById("rightAd").value,
        image: document.getElementById("imgAd").value
    };

    localStorage.setItem("adsConfig", JSON.stringify(ads));

    alert("Ads Saved Permanently!");
    location.reload();
}

/* ================= DELETE ADS ================= */
function deleteAds() {
    localStorage.removeItem("adsConfig");
    alert("Ads Deleted!");
    location.reload();
}

/* ================= RENDER ADS ================= */
function injectAd(code) {
    if (!code) return;

    const div = document.createElement("div");
    div.innerHTML = code;
    document.body.appendChild(div);
}

window.addEventListener("load", () => {
    injectAd(ads.top);
    injectAd(ads.bottom);
    injectAd(ads.left);
    injectAd(ads.right);
});
</script>
